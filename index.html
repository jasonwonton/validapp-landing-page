    <style>
        @font-face {
            font-family: "Jua-Regular";
            src: url("assets/Jua-Regular.ttf") format("truetype");
            font-display: swap;
        }
        :root {
            color-scheme: light;
            --bg: #f2fffd;
            --text: #050914;
            --muted: rgba(5, 9, 20, 0.72);
            --surface: rgba(255, 255, 255, 0.74);
            --border: rgba(5, 9, 20, 0.14);
            --accent: #ffb15e;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Jua-Regular", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        a {
            color: inherit;
        }
        .site-header {
            background: rgba(242, 255, 253, 0.94);
            border-bottom: 1px solid var(--border);
        }
        .nav {
            width: min(1040px, calc(100% - 32px));
            min-height: 72px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.15rem;
            text-decoration: none;
        }
        .brand img {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            color: var(--muted);
            font-size: 1rem;
        }
        .nav-links a {
            text-decoration: none;
        }
        .nav-links a:hover {
            color: var(--text);
        }
        main {
            width: min(1040px, calc(100% - 32px));
            margin: 0 auto;
            padding: clamp(28px, 5vw, 48px) 0 52px;
            text-align: center;
        }
        .hero-logo {
            width: min(260px, 68vw);
            height: auto;
            display: block;
            margin: 0 auto 12px;
        }
        .hero-title {
            margin: 0 0 12px;
            font-size: clamp(3rem, 10vw, 5.6rem);
            line-height: 0.98;
            letter-spacing: 0;
        }
        .hero-copy {
            max-width: 680px;
            margin: 0 auto 26px;
            color: var(--muted);
            font-size: clamp(1.2rem, 3vw, 1.55rem);
            line-height: 1.45;
        }
        .cta-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: clamp(26px, 5vw, 42px);
        }
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 54px;
            padding: 0 28px;
            border: 3px solid var(--text);
            border-radius: 30px;
            background: var(--accent);
            color: var(--text);
            font-size: 1.08rem;
            text-decoration: none;
            box-shadow: 0 12px 32px rgba(255, 122, 89, 0.26);
        }
        .mockup {
            margin: 0 auto;
            width: min(820px, 100%);
        }
        .mockup img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(5, 9, 20, 0.2);
        }
        .quick-info {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
            color: var(--muted);
            font-size: 0.98rem;
        }
        .quick-info a {
            color: var(--text);
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        footer {
            width: min(1040px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0 34px;
            border-top: 1px solid var(--border);
            color: var(--muted);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
            font-size: 0.95rem;
        }
        footer a {
            color: var(--text);
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 700px) {
            .nav {
                align-items: flex-start;
                flex-direction: column;
                padding: 14px 0;
            }
            .nav-links {
                justify-content: flex-start;
                gap: 12px 14px;
            }
            .button {
                width: 100%;
            }
            .mockup img {
                border-radius: 12px;
            }
        }
    </style>
</head>
